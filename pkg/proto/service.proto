syntax = "proto3";

option csharp_namespace = "AccelByte.Extend.ServiceExtension";
option go_package = "accelbyte.net/extend/serviceextension";
option java_package = "net.accelbyte.extend.serviceextension";
option java_multiple_files = true;

package service;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "permission.proto";

service Service {

  rpc CreateUserBehaviorTelemetry (CreateUserBehaviorTelemetryRequest) returns (CreateTelemetryResponse) {
    // option (permission.action) = CREATE;
    // option (permission.resource) = "NAMESPACE:{namespace}:TELEMETRY";
    option (google.api.http) = {
      post: "/v1/telemetry/user-behavior"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Record user behavior telemetry"
      description: "Receive and store user behavior events such as session start/end, feature usage, and navigation patterns"
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc CreateGameplayTelemetry (CreateGameplayTelemetryRequest) returns (CreateTelemetryResponse) {
    // option (permission.action) = CREATE;
    // option (permission.resource) = "NAMESPACE:{namespace}:TELEMETRY";
    option (google.api.http) = {
      post: "/v1/telemetry/gameplay"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Record gameplay telemetry"
      description: "Receive and store in-game events such as player deaths, level completions, and combat actions"
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  rpc CreatePerformanceTelemetry (CreatePerformanceTelemetryRequest) returns (CreateTelemetryResponse) {
    // option (permission.action) = CREATE;
    // option (permission.resource) = "NAMESPACE:{namespace}:TELEMETRY";
    option (google.api.http) = {
      post: "/v1/telemetry/performance"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Record technical performance telemetry"
      description: "Receive and store performance snapshots such as FPS, memory usage, ping, and hardware information"
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }
}

// Shared response for all telemetry endpoints
message CreateTelemetryResponse {}

// ===== User Behavior Telemetry =====

message UserInfo {
  string id                 = 1;
  string country            = 2;
  string platform           = 3;
  string acquisition_source = 4;
}

message UserBehaviorContext {
  string session_id           = 1;
  double total_playtime_hours = 2;
  string last_login           = 3;
}

message CreateUserBehaviorTelemetryRequest {
  string             event_id  = 1;
  string             version   = 2;
  string             timestamp = 3;
  UserInfo           user      = 4;
  UserBehaviorContext context  = 5;
}

// ===== Gameplay Telemetry =====

message Location {
  double x = 1;
  double y = 2;
  double z = 3;
}

message GameplayData {
  Location location        = 1;
  string   map_id          = 2;
  string   cause           = 3;
  string   active_weapon   = 4;
  string   attacker_id     = 5;
  string   current_mission = 6;
}

message CreateGameplayTelemetryRequest {
  string       event_id  = 1;
  string       version   = 2;
  string       timestamp = 3;
  GameplayData data      = 4;
}

// ===== Technical Performance Telemetry =====

message PerformanceMetrics {
  double fps_avg           = 1;
  double fps_min           = 2;
  int64  memory_usage_mb   = 3;
  int64  ping_ms           = 4;
  int64  gpu_load_percent  = 5;
}

message HardwareInfo {
  string cpu            = 1;
  string gpu            = 2;
  string driver_version = 3;
}

message CreatePerformanceTelemetryRequest {
  string             event_id  = 1;
  string             version   = 2;
  string             timestamp = 3;
  PerformanceMetrics metrics   = 4;
  HardwareInfo       hardware  = 5;
}

// OpenAPI options for the entire API.
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Game Telemetry Collector API";
    version: "2.0";
    description: "Telemetry collection service for AccelByte AGS games. Supports user behavior, gameplay, and technical performance events."
  };
  base_path: "/telemetry";

  security_definitions: {
    security: {
      key: "Bearer";
      value: {
        type: TYPE_API_KEY;
        in: IN_HEADER;
        name: "Authorization";
      }
    }
  };
};
